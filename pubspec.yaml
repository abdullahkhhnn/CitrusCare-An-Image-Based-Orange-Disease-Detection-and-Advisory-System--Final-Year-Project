name: citruscare_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_map: ^6.1.0          # ← ADD THIS
  latlong2: ^0.9.0              # ← ADD THIS
  
  # Cross-platform packages
  image_picker: ^1.0.4
  geolocator: ^10.1.0
  image: ^4.1.3
  http: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Mobile-only packages
  camera: ^0.10.5+5
  path_provider: ^2.1.1
  tflite_v2: ^1.0.0
  google_maps_flutter: ^2.5.0
  
  # Web-only packages
  google_maps: ^7.1.0
  js: ^0.6.7
  
  # For conditional imports
  flutter_platform_widgets: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/plant_disease_model.tflite
    - assets/labels.txt
  # - assets/web_model/  # For TensorFlow.js model